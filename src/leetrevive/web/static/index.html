<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>leetrevive</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0d0d0d;
      --surface:  #161616;
      --surface2: #1f1f1f;
      --border:   #2a2a2a;
      --text:     #e2e2e2;
      --muted:    #666;
      --accent:   #4ade80;
      --accent2:  #22d3ee;
      --easy:     #4ade80;
      --medium:   #fbbf24;
      --hard:     #f87171;
      --radius:   10px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Nav ─────────────────────────────────────────────────────────── */
    nav {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 0 24px;
      height: 52px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
      flex-shrink: 0;
    }
    .logo {
      font-weight: 700;
      font-size: 1rem;
      color: var(--accent);
      letter-spacing: -0.5px;
      margin-right: 16px;
    }
    .nav-tab {
      padding: 5px 14px;
      border-radius: 6px;
      border: none;
      background: transparent;
      color: var(--muted);
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
    }
    .nav-tab:hover  { color: var(--text); background: var(--surface2); }
    .nav-tab.active { color: var(--text); background: var(--surface2); }
    .nav-stats {
      margin-left: auto;
      display: flex;
      gap: 18px;
      font-size: 0.78rem;
      color: var(--muted);
    }
    .nav-stats span b { color: var(--text); }
    .nav-stats .overdue b { color: var(--hard); }

    /* ── Views ────────────────────────────────────────────────────────── */
    .view { display: none; flex: 1; flex-direction: column; }
    .view.active { display: flex; }

    /* ── TODAY VIEW ───────────────────────────────────────────────────── */
    #view-today {
      align-items: center;
      padding: 40px 24px;
      gap: 28px;
    }
    .today-hero { text-align: center; }
    .today-hero h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 6px; }
    .today-hero p  { color: var(--muted); font-size: 0.87rem; }

    .btn-generate {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 28px;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn-generate:hover    { opacity: 0.9; }
    .btn-generate:active   { transform: scale(0.98); }
    .btn-generate:disabled { opacity: 0.4; cursor: not-allowed; }

    .cards-grid {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
      width: 100%;
      max-width: 1060px;
    }

    /* ── Problem card ────────────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 22px;
      width: 320px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      animation: fadeUp 0.25s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .card-header { display: flex; align-items: flex-start; gap: 12px; }
    .card-num {
      width: 34px; height: 34px;
      border-radius: 8px;
      background: var(--surface2);
      display: grid;
      place-items: center;
      font-weight: 700;
      font-size: 0.82rem;
      color: var(--muted);
      flex-shrink: 0;
    }
    .card-meta { flex: 1; }
    .card-title { font-weight: 600; font-size: 0.92rem; line-height: 1.35; margin-bottom: 4px; }
    .card-pid   { font-size: 0.73rem; color: var(--muted); display: flex; gap: 5px; flex-wrap: wrap; }

    .badge {
      display: inline-block;
      padding: 2px 7px;
      border-radius: 4px;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .badge-easy   { background: #14532d55; color: var(--easy); }
    .badge-medium { background: #78350f55; color: var(--medium); }
    .badge-hard   { background: #7f1d1d55; color: var(--hard); }
    .badge-reason { background: #1e3a5f;   color: var(--accent2); }

    .card-tags { display: flex; flex-wrap: wrap; gap: 4px; }
    .tag-pill {
      padding: 2px 7px;
      border-radius: 20px;
      font-size: 0.68rem;
      background: var(--surface2);
      color: var(--muted);
      border: 1px solid var(--border);
    }

    .card-insight {
      font-size: 0.78rem;
      line-height: 1.5;
      color: var(--muted);
      background: var(--surface2);
      border-left: 3px solid var(--accent2);
      padding: 6px 10px;
      border-radius: 0 4px 4px 0;
      font-style: italic;
    }
    .card-insight-label {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--accent2);
      display: block;
      margin-bottom: 2px;
      font-style: normal;
    }

    .card-actions { display: flex; gap: 8px; margin-top: auto; }
    .btn-open {
      flex: 1;
      padding: 8px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      text-align: center;
      transition: background 0.15s;
    }
    .btn-open:hover { background: var(--surface2); }
    .btn-done {
      flex: 1;
      padding: 8px;
      border-radius: 6px;
      border: none;
      background: var(--accent);
      color: #000;
      font-size: 0.8rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn-done:hover    { opacity: 0.85; }
    .btn-done:disabled { opacity: 0.35; cursor: not-allowed; }

    /* ── Score panel ─────────────────────────────────────────────────── */
    .score-panel {
      border-top: 1px solid var(--border);
      padding-top: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .score-panel label { font-size: 0.76rem; color: var(--muted); }
    .score-btns { display: flex; gap: 5px; }
    .score-btn {
      flex: 1;
      padding: 6px 3px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--muted);
      font-size: 0.73rem;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
      transition: all 0.12s;
    }
    .score-btn:hover                { border-color: var(--accent); color: var(--text); }
    .score-btn.selected             { border-color: var(--accent); background: #14532d55; color: var(--accent); }
    .score-btn[data-score="0"].selected { border-color: var(--hard);   background: #7f1d1d55; color: var(--hard); }
    .score-btn[data-score="1"].selected { border-color: var(--medium); background: #78350f55; color: var(--medium); }
    .score-panel input[type="number"],
    .score-panel textarea {
      width: 100%;
      padding: 6px 9px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 0.78rem;
      font-family: inherit;
      resize: none;
      outline: none;
    }
    .score-panel input:focus,
    .score-panel textarea:focus { border-color: var(--accent2); }
    .btn-submit {
      padding: 8px;
      border-radius: 6px;
      border: none;
      background: var(--accent2);
      color: #000;
      font-size: 0.8rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn-submit:hover    { opacity: 0.85; }
    .btn-submit:disabled { opacity: 0.35; cursor: not-allowed; }
    .card-done-msg {
      text-align: center;
      font-size: 0.8rem;
      color: var(--accent);
      padding: 6px 0;
    }

    /* ── BANK VIEW ───────────────────────────────────────────────────── */
    #view-bank { padding: 32px 28px; max-width: 900px; width: 100%; margin: 0 auto; gap: 24px; }

    /* Add problem box */
    .add-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 22px;
    }
    .add-box h2 { font-size: 0.95rem; font-weight: 700; margin-bottom: 14px; }
    .add-row { display: flex; gap: 10px; }
    .add-input {
      flex: 1;
      padding: 9px 12px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 0.9rem;
      outline: none;
      font-family: inherit;
    }
    .add-input:focus { border-color: var(--accent2); }
    .btn-add {
      padding: 9px 20px;
      border-radius: 6px;
      border: none;
      background: var(--accent);
      color: #000;
      font-size: 0.85rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s;
      white-space: nowrap;
    }
    .btn-add:hover    { opacity: 0.88; }
    .btn-add:disabled { opacity: 0.4; cursor: not-allowed; }

    /* preview row shown after lookup */
    .add-preview {
      margin-top: 12px;
      padding: 10px 12px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 7px;
      font-size: 0.83rem;
      display: none;
      align-items: center;
      gap: 10px;
    }
    .add-preview.visible { display: flex; }
    .add-preview-title { flex: 1; font-weight: 600; }
    .add-preview-msg { font-size: 0.78rem; color: var(--hard); margin-top: 8px; display: none; }
    .add-preview-msg.visible { display: block; }

    /* Bank table */
    .bank-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .bank-header h2 { font-size: 0.95rem; font-weight: 700; }
    .bank-count     { font-size: 0.8rem; color: var(--muted); }

    .bank-filter {
      padding: 7px 11px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 0.82rem;
      outline: none;
      font-family: inherit;
      width: 200px;
    }
    .bank-filter:focus { border-color: var(--accent2); }

    .bank-table-wrap { overflow-x: auto; }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.83rem;
    }
    thead th {
      text-align: left;
      padding: 8px 10px;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
      cursor: pointer;
      user-select: none;
    }
    thead th:hover { color: var(--text); }
    thead th.sorted { color: var(--accent2); }
    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.1s;
    }
    tbody tr:hover { background: var(--surface2); }
    tbody td { padding: 9px 10px; vertical-align: top; }
    .td-id    { color: var(--muted); white-space: nowrap; font-size: 0.78rem; }
    .td-title a { color: var(--text); text-decoration: none; font-weight: 500; }
    .td-title a:hover { color: var(--accent2); }
    .td-insight { color: var(--muted); font-size: 0.74rem; font-style: italic; margin-top: 3px; }
    .td-due { white-space: nowrap; font-size: 0.78rem; }
    .due-overdue  { color: var(--hard); }
    .due-today    { color: var(--medium); font-weight: 600; }
    .due-upcoming { color: var(--muted); }
    .due-never    { color: #444; }
    .td-actions { white-space: nowrap; }
    .btn-row-done {
      padding: 4px 10px;
      border-radius: 5px;
      border: none;
      background: var(--accent);
      color: #000;
      font-size: 0.72rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.12s;
    }
    .btn-row-done:hover { opacity: 0.8; }

    /* inline score panel inside table row */
    .row-score-panel {
      background: var(--surface2);
      border-top: 1px solid var(--border);
      padding: 10px;
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      align-items: center;
    }
    .row-score-panel .score-btns { display: flex; gap: 4px; }
    .row-score-panel .score-btn {
      padding: 4px 8px;
      font-size: 0.7rem;
    }
    .row-score-panel .btn-submit {
      padding: 5px 12px;
      font-size: 0.75rem;
    }

    .empty-bank {
      text-align: center;
      color: var(--muted);
      font-size: 0.87rem;
      padding: 40px 0;
    }
    .empty-bank p { margin-bottom: 8px; }
  </style>
</head>
<body>

<!-- ── Nav ───────────────────────────────────────────────────────────── -->
<nav>
  <span class="logo">⟳ leetrevive</span>
  <button class="nav-tab active" data-view="today">📅 Today</button>
  <button class="nav-tab"        data-view="bank">📚 My Bank</button>
  <div class="nav-stats" id="nav-stats"></div>
</nav>

<!-- ── Today view ────────────────────────────────────────────────────── -->
<div class="view active" id="view-today">
  <div class="today-hero">
    <h1>What should I review today?</h1>
    <p>Problems are picked by due date, weak spots, and recent activity.</p>
  </div>

  <button class="btn-generate" id="btn-generate">⚡ Generate Today's Problems</button>

  <div class="cards-grid" id="cards-grid"></div>
</div>

<!-- ── Bank view ─────────────────────────────────────────────────────── -->
<div class="view" id="view-bank">

  <!-- Add problem -->
  <div class="add-box">
    <h2>➕ Add a Problem</h2>
    <div class="add-row">
      <input class="add-input" id="add-input" type="text"
             placeholder="Problem ID (e.g. 146)  or  Title keywords"
             autocomplete="off" />
      <button class="btn-add" id="btn-add">Add</button>
    </div>
    <div class="add-preview" id="add-preview">
      <span class="add-preview-title" id="add-preview-title"></span>
      <span id="add-preview-diff"></span>
    </div>
    <div class="add-preview-msg" id="add-preview-msg"></div>
  </div>

  <!-- Problem bank -->
  <div>
    <div class="bank-header" style="margin-bottom:12px">
      <h2>My Bank <span class="bank-count" id="bank-count"></span></h2>
      <input class="bank-filter" id="bank-filter" type="text" placeholder="Filter…" />
    </div>
    <div class="bank-table-wrap">
      <table id="bank-table">
        <thead>
          <tr>
            <th data-col="problem_id">#</th>
            <th data-col="title">Title</th>
            <th data-col="difficulty">Diff</th>
            <th data-col="next_due_at">Next Due</th>
            <th data-col="review_count">Reviews</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="bank-tbody"></tbody>
      </table>
      <div class="empty-bank" id="bank-empty" style="display:none">
        <p>No problems yet.</p>
        <p>Add some above — just type a problem number like <b>1</b>, <b>146</b>, or <b>200</b>.</p>
      </div>
    </div>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);
const DIFF_BADGE = d => d ? `<span class="badge badge-${d}">${d}</span>` : '';

// ── Nav tabs ──────────────────────────────────────────────────────────────
document.querySelectorAll('.nav-tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.nav-tab').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    btn.classList.add('active');
    $('view-' + btn.dataset.view).classList.add('active');
    if (btn.dataset.view === 'bank') loadBank();
  });
});

// ── Nav stats ─────────────────────────────────────────────────────────────
async function loadStats() {
  try {
    const s = await fetch('/api/stats').then(r => r.json());
    $('nav-stats').innerHTML = `
      <span><b>${s.total_problems}</b> problems</span>
      <span><b>${s.total_reviews}</b> reviews</span>
      <span class="${s.overdue > 0 ? 'overdue' : ''}"><b>${s.overdue}</b> overdue</span>
    `;
  } catch(e) {}
}
loadStats();

// ── TODAY ─────────────────────────────────────────────────────────────────
const btnGen  = $('btn-generate');
const cardsEl = $('cards-grid');

btnGen.addEventListener('click', async () => {
  btnGen.disabled = true;
  btnGen.textContent = 'Loading…';
  cardsEl.innerHTML = '';
  try {
    const data = await fetch('/api/today').then(r => r.json());
    if (!data.picks.length) {
      cardsEl.innerHTML = `<p style="color:var(--muted);font-size:.9rem">🎉 Nothing due today — you're all caught up!</p>`;
    } else {
      data.picks.forEach((p, i) => cardsEl.appendChild(buildCard(p, i + 1)));
    }
  } catch(e) {
    cardsEl.innerHTML = `<p style="color:var(--hard)">Error loading picks.</p>`;
  } finally {
    btnGen.disabled = false;
    btnGen.textContent = '⚡ Generate Today\'s Problems';
  }
});

function buildCard(p, n) {
  const card = document.createElement('div');
  card.className = 'card';
  card.style.animationDelay = `${(n - 1) * 0.07}s`;
  const tagPills = (p.tags || []).slice(0, 5).map(t => `<span class="tag-pill">${t}</span>`).join('');
  card.innerHTML = `
    <div class="card-header">
      <div class="card-num">#${p.problem_id}</div>
      <div class="card-meta">
        <div class="card-title">${p.title}</div>
        <div class="card-pid">
          ${DIFF_BADGE(p.difficulty)}
          ${p.pattern ? `<span class="badge" style="background:#1e3a5f;color:var(--accent2)">${p.pattern}</span>` : ''}
        </div>
      </div>
    </div>
    ${tagPills ? `<div class="card-tags">${tagPills}</div>` : ''}
    ${p.insight ? `<div class="card-insight"><span class="card-insight-label">💡 Key insight</span>${p.insight}</div>` : ''}
    <div><span class="badge badge-reason">${p.reason}</span></div>
    <div class="card-actions">
      <a class="btn-open" href="${p.url || '#'}" target="_blank" rel="noopener">Open LeetCode ↗</a>
      <button class="btn-done">Mark Done</button>
    </div>
  `;
  card.querySelector('.btn-done').addEventListener('click', function() {
    this.style.display = 'none';
    card.appendChild(buildScorePanel(p.problem_id));
  });
  return card;
}

function buildScorePanel(pid, onDone) {
  const panel = document.createElement('div');
  panel.className = 'score-panel';
  panel.innerHTML = `
    <label>How did it go?</label>
    <div class="score-btns">
      <button class="score-btn" data-score="0">0<br><small>Blank</small></button>
      <button class="score-btn" data-score="1">1<br><small>Partial</small></button>
      <button class="score-btn" data-score="2">2<br><small>OK</small></button>
      <button class="score-btn" data-score="3">3<br><small>Clean</small></button>
    </div>
    <input type="number" class="inp-minutes" placeholder="Minutes spent (optional)" min="1" max="999" />
    <textarea class="inp-note"    rows="2" placeholder="Note (optional)"></textarea>
    <textarea class="inp-mistake" rows="2" placeholder="Mistake to remember (optional)"></textarea>
    <button class="btn-submit" disabled>Submit</button>
  `;
  let selectedScore = null;
  panel.querySelectorAll('.score-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      panel.querySelectorAll('.score-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      selectedScore = parseInt(btn.dataset.score);
      panel.querySelector('.btn-submit').disabled = false;
    });
  });
  panel.querySelector('.btn-submit').addEventListener('click', async () => {
    panel.querySelector('.btn-submit').disabled = true;
    try {
      const res = await fetch('/api/done', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          problem_id: pid,
          score:      selectedScore,
          minutes:    parseInt(panel.querySelector('.inp-minutes').value) || null,
          note:       panel.querySelector('.inp-note').value.trim() || null,
          mistake:    panel.querySelector('.inp-mistake').value.trim() || null,
        }),
      }).then(r => r.json());
      panel.innerHTML = `<div class="card-done-msg">✓ Recorded — next due <b>${res.next_due_at}</b> · review #${res.review_count}</div>`;
      loadStats();
      if (onDone) onDone();
    } catch(e) {
      panel.querySelector('.btn-submit').disabled = false;
      alert('Error saving review.');
    }
  });
  return panel;
}

// ── BANK ──────────────────────────────────────────────────────────────────
let bankData = [];
let sortCol  = 'next_due_at';
let sortAsc  = true;

async function loadBank() {
  try {
    const res = await fetch('/api/bank').then(r => r.json());
    bankData = res.problems;
    renderBank();
  } catch(e) {}
}

function renderBank() {
  const filter = $('bank-filter').value.toLowerCase();
  let rows = bankData.filter(p =>
    !filter ||
    p.problem_id.includes(filter) ||
    p.title.toLowerCase().includes(filter) ||
    (p.difficulty || '').toLowerCase().includes(filter) ||
    (p.tags || []).some(t => t.includes(filter))
  );

  // Sort
  rows.sort((a, b) => {
    let va = a[sortCol], vb = b[sortCol];
    if (va === null || va === undefined) va = sortAsc ? 'zzz' : '';
    if (vb === null || vb === undefined) vb = sortAsc ? 'zzz' : '';
    if (sortCol === 'review_count' || sortCol === 'avg_score') {
      va = parseFloat(va) || 0; vb = parseFloat(vb) || 0;
    }
    return sortAsc ? (va > vb ? 1 : -1) : (va < vb ? 1 : -1);
  });

  $('bank-count').textContent = `(${rows.length})`;
  const tbody = $('bank-tbody');
  tbody.innerHTML = '';
  $('bank-empty').style.display = rows.length === 0 ? 'block' : 'none';

  const today = new Date().toISOString().slice(0, 10);

  rows.forEach(p => {
    const tr = document.createElement('tr');

    // due date display
    let dueCell = '<span class="due-never">—</span>';
    if (p.next_due_at) {
      if (p.next_due_at < today)
        dueCell = `<span class="due-overdue">overdue</span>`;
      else if (p.next_due_at === today)
        dueCell = `<span class="due-today">today</span>`;
      else
        dueCell = `<span class="due-upcoming">${p.next_due_at}</span>`;
    }

    tr.innerHTML = `
      <td class="td-id">#${p.problem_id}</td>
      <td class="td-title">
        <a href="${p.url || '#'}" target="_blank" rel="noopener">${p.title}</a>
        ${p.insight ? `<div class="td-insight">${p.insight}</div>` : ''}
      </td>
      <td>${DIFF_BADGE(p.difficulty)}</td>
      <td class="td-due">${dueCell}</td>
      <td style="color:var(--muted);font-size:.78rem">${p.review_count || 0}${p.avg_score !== null && p.avg_score !== undefined ? ` · avg ${p.avg_score}` : ''}</td>
      <td class="td-actions"><button class="btn-row-done">Done</button></td>
    `;

    // inline "Done" from bank row
    tr.querySelector('.btn-row-done').addEventListener('click', function() {
      // If a panel already open on this row, remove it
      const existing = tr.nextSibling;
      if (existing && existing.classList && existing.classList.contains('score-row')) {
        existing.remove();
        this.textContent = 'Done';
        return;
      }
      this.textContent = '✕';
      const panelRow = document.createElement('tr');
      panelRow.className = 'score-row';
      const td = document.createElement('td');
      td.colSpan = 6;
      const panel = buildScorePanel(p.problem_id, () => {
        panelRow.remove();
        tr.querySelector('.btn-row-done').textContent = 'Done';
        loadBank(); // refresh next_due
      });
      panel.className = 'row-score-panel';
      td.appendChild(panel);
      panelRow.appendChild(td);
      tr.after(panelRow);
    });

    tbody.appendChild(tr);
  });

  // Update sort header highlights
  document.querySelectorAll('#bank-table thead th').forEach(th => {
    th.classList.toggle('sorted', th.dataset.col === sortCol);
  });
}

$('bank-filter').addEventListener('input', renderBank);

document.querySelectorAll('#bank-table thead th[data-col]').forEach(th => {
  th.addEventListener('click', () => {
    if (sortCol === th.dataset.col) sortAsc = !sortAsc;
    else { sortCol = th.dataset.col; sortAsc = true; }
    renderBank();
  });
});

// ── ADD PROBLEM ───────────────────────────────────────────────────────────
const addInput   = $('add-input');
const btnAdd     = $('btn-add');
const addPreview = $('add-preview');
const addMsg     = $('add-preview-msg');
let   previewPid = null;
let   lookupTimer = null;

addInput.addEventListener('input', () => {
  clearTimeout(lookupTimer);
  const val = addInput.value.trim();
  if (!val || !/^\d+$/.test(val)) {
    addPreview.classList.remove('visible');
    addMsg.classList.remove('visible');
    previewPid = null;
    return;
  }
  lookupTimer = setTimeout(() => lookupPreview(val), 350);
});

addInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') doAdd();
});
btnAdd.addEventListener('click', doAdd);

async function lookupPreview(pid) {
  try {
    const meta = await fetch(`/api/search/${pid}`).then(r => r.json());
    previewPid = pid;
    $('add-preview-title').textContent = `#${meta.problem_id} ${meta.title}`;
    $('add-preview-diff').innerHTML = DIFF_BADGE(meta.difficulty);
    addPreview.classList.add('visible');
    if (meta.in_bank) {
      addMsg.textContent = 'Already in your bank.';
      addMsg.style.color = 'var(--medium)';
      addMsg.classList.add('visible');
      btnAdd.disabled = true;
    } else {
      addMsg.classList.remove('visible');
      btnAdd.disabled = false;
    }
  } catch(e) {
    addPreview.classList.remove('visible');
    addMsg.classList.remove('visible');
    previewPid = null;
  }
}

async function doAdd() {
  const val = addInput.value.trim();
  if (!val) return;
  btnAdd.disabled = true;
  btnAdd.textContent = '…';
  try {
    const res = await fetch('/api/add', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ problem_id: val }),
    }).then(r => r.json());
    addMsg.textContent = `✓ Added: #${res.problem_id} ${res.title}`;
    addMsg.style.color = 'var(--accent)';
    addMsg.classList.add('visible');
    addInput.value = '';
    addPreview.classList.remove('visible');
    previewPid = null;
    loadStats();
    loadBank();
  } catch(e) {
    const err = await e.response?.json().catch(() => null);
    addMsg.textContent = err?.detail || 'Error adding problem.';
    addMsg.style.color = 'var(--hard)';
    addMsg.classList.add('visible');
  } finally {
    btnAdd.textContent = 'Add';
    btnAdd.disabled = false;
  }
}
</script>
